name: Build Typst Documents
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Compile Exercises
        run: |
          nix develop .#ci --command bash -c '
            mkdir -p artifacts
            unset SOURCE_DATE_EPOCH
            
            for dir in exercise-*; do
              if [ -d "$dir" ] && [ -f "$dir/main.typ" ]; then
                num=$(echo "$dir" | cut -d"-" -f2)
                echo "Processing $dir as hpdc-$num.pdf..."
                
                typst compile "$dir/main.typ" "artifacts/hpdc-$num.pdf"
              fi
            done
          '

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hpdc-compiled-pdfs
          path: artifacts/*.pdf
